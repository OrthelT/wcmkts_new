name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.inputs.pr_number }} in this repository.

            Use `gh pr view ${{ github.event.inputs.pr_number }}` and `gh pr diff ${{ github.event.inputs.pr_number }}` to get the PR details and changes.

            Check for:
            - Bugs and logic errors
            - Code style and adherence to project conventions (see CLAUDE.md)
            - Security issues
            - Performance concerns
            - Missing tests

            Post your review as a PR comment using `gh pr review ${{ github.event.inputs.pr_number }} --comment --body "<your review>"`.
