# Maps faction modules to identical substitutes in fit supply calculations. 
[module_strategy]
  use_equivalent = true

# Use to mirror doctrine assignments for two markets. 
[doctrine_override]
    doctrine_override_enabled = true
    override_market_alias = 'wcmktprod'
    use_market_key = 'primary'

# database configurations, including utility databases other than for markets. 
[db_paths]
    "wcmktprod" = "wcmktprod.db"
    "wcmktnorth" = "wcmktnorth2.db"
    "sde" = "sdelite.db"
    "build_cost" = "buildcost.db"
    "wcmkttest" = "wcmkttest.db"
    "wcmktnewkeep" = "wcmktnewkeep.db"

[db_update]
  "frequency" = 1 # frequency of scheduled db updates in hours 
  "time" = 20 # minutes after the hour of scheduled updates 

[db_turso_keys]
    "sde" = "sdelite_turso"
    "build_cost" = "buildcost_turso"

[freshness_probes]
    "wcmktprod" = "marketstats"
    "wcmktnewkeep" = "marketstats"
    "build_cost" = "buildcost"
    "wcmktnorth" = "marketstats"

[env_db_aliases]
    "prod" = "wcmktnewkeep"
    "dev" = "wcmkttest"

[env]
    env = "prod"
    log_level = "INFO" #INFO or DEBUG (case sensitive)

[market]
    name = "4-HWWF"
    short_name = "4H-New"

[import_helper]
    default_shipping_cost = 445

[i18n]
    default_language = "en"

[eve_sso]
    client_id = "f9aae67fb3af430db7242e1f26d46f1d"
    callback_url = "https://wcmkts.streamlit.app/admin_login"
    allowed_character_ids = [1387156123, 2116257395, 2122420464]

[admin]
    write_target = "remote" #remote or local
    session_ttl_minutes = 480
    oauth_state_ttl_minutes = 15


